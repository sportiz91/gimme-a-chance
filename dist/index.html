<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gimme-a-chance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: rgba(15, 15, 15, 0.85);
      color: #e0e0e0;
      min-height: 100vh;
      overflow-y: auto;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Draggable title bar */
    .titlebar {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      background: rgba(30, 30, 30, 0.95);
      cursor: grab;
    }
    .titlebar:active { cursor: grabbing; }
    .titlebar span { font-size: 11px; opacity: 0.5; }

    .container {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      padding: 6px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: rgba(255,255,255,0.15); }
    button.active {
      background: rgba(76, 175, 80, 0.3);
      border-color: rgba(76, 175, 80, 0.5);
    }

    select {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      font-size: 12px;
    }

    /* Status indicator */
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      opacity: 0.6;
    }
    .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #666;
    }
    .status .dot.live {
      background: #4caf50;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Transcript area */
    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.4;
      margin-top: 4px;
    }

    #transcript {
      max-height: 180px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.5;
      padding: 8px;
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    #transcript:empty::after {
      content: 'Waiting for audio...';
      opacity: 0.3;
      font-style: italic;
    }
    .spk-int { color: #64b5f6; font-weight: 700; }
    .spk-me  { color: #81c784; font-weight: 700; }
    /* Live partial hypothesis from the streaming STT engine */
    .partial { opacity: 0.55; font-style: italic; }

    /* Answer area */
    #response {
      min-height: 100px;
      max-height: 400px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
      padding: 10px;
      background: rgba(33, 150, 243, 0.08);
      border-radius: 6px;
      border: 1px solid rgba(33, 150, 243, 0.2);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    #response:empty::after {
      content: 'Answer will appear here...';
      opacity: 0.3;
      font-style: italic;
    }
    #response.loading::after {
      content: 'Thinking...';
      opacity: 0.5;
      animation: pulse 1s infinite;
    }

    /* Manual ask input */
    .ask-row {
      display: flex;
      gap: 6px;
    }
    .ask-row input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }
    .ask-row input:focus {
      border-color: rgba(33, 150, 243, 0.5);
    }

    /* Debug overlay panel — toggled with Ctrl+Shift+D */
    .debug-panel {
      position: fixed;
      bottom: 8px;
      left: 8px;
      right: 8px;
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(100, 149, 237, 0.4);
      border-radius: 6px;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-size: 10px;
      line-height: 1.5;
      color: #b5d3ff;
      display: none;
      z-index: 1000;
    }
    .debug-panel.visible { display: block; }
    .debug-panel .row { display: flex; justify-content: space-between; }
    .debug-panel .key { opacity: 0.6; }
    .debug-panel .val { font-weight: 600; }
    .debug-panel .warn { color: #ffb74d; }
    .debug-panel .bad { color: #ef5350; }
    .debug-panel .title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.5;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="titlebar" data-tauri-drag-region>
    <span>gimme-a-chance</span>
    <div class="status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Idle</span>
    </div>
  </div>

  <div class="container">
    <div class="controls">
      <select id="sourceSelect" onchange="loadDevices()" title="Capture source" style="flex:0 0 auto; max-width:170px">
        <option value="mic">🎙️ Microphone</option>
        <option value="loopback">🔊 System audio</option>
        <option value="both">🎙️+🔊 Both (interviewer + you)</option>
      </select>
      <select id="deviceSelect"></select>
      <select id="langSelect" onchange="setLanguage()" title="Language (transcription + answers)" style="flex:0 0 auto; max-width:120px">
        <option value="english">English</option>
        <option value="spanish">Español</option>
      </select>
      <button id="listenBtn" onclick="toggleListening()">Listen</button>
      <label style="display:flex;align-items:center;gap:4px;font-size:11px;opacity:0.7;white-space:nowrap" title="Also answer questions YOU ask via the mic">
        <input type="checkbox" id="answerMe"> answer me
      </label>
    </div>

    <div class="section-label">Transcript</div>
    <div id="transcript"></div>

    <div class="section-label">Answer</div>
    <div id="response"></div>

    <div class="ask-row">
      <input id="askInput" type="text" placeholder="Ask manually..." onkeydown="if(event.key==='Enter')askBrain()" />
      <button onclick="askBrain()">Ask</button>
    </div>

    <div class="section-label">Simulate interviewer (test)</div>
    <div class="ask-row">
      <select id="simPreset" onchange="document.getElementById('simInput').value=this.value" style="flex:0 0 auto; max-width:150px">
        <option value="">Presets…</option>
        <option value="What is a rate limiter, and when would you use one?">Factual</option>
        <option value="How would you design a distributed rate limiter? Walk me through the trade-offs.">System design</option>
        <option value="Write a function that reverses a linked list, and explain the approach.">Coding</option>
        <option value="Tell me about a challenging project you worked on recently.">Behavioral</option>
      </select>
      <input id="simInput" type="text" placeholder="Interviewer question to speak aloud..." onkeydown="if(event.key==='Enter')simulateInterviewer()" />
      <button onclick="simulateInterviewer()">🔊 Speak</button>
    </div>
  </div>

  <div class="debug-panel" id="debugPanel">
    <div class="title">Debug · Ctrl+Shift+D</div>
    <div class="row"><span class="key">callback p50</span><span class="val" id="dbgP50">—</span></div>
    <div class="row"><span class="key">callback p95</span><span class="val" id="dbgP95">—</span></div>
    <div class="row"><span class="key">callback p99</span><span class="val" id="dbgP99">—</span></div>
    <div class="row"><span class="key">callback p99.9</span><span class="val" id="dbgP999">—</span></div>
    <div class="row"><span class="key">callback samples</span><span class="val" id="dbgSamples">—</span></div>
    <div class="row"><span class="key">last STT</span><span class="val" id="dbgStt">—</span></div>
    <div class="row"><span class="key">last LLM total</span><span class="val" id="dbgLlm">—</span></div>
    <div class="row"><span class="key">last LLM TTFT</span><span class="val" id="dbgTtft">—</span></div>
    <div class="row"><span class="key">provider</span><span class="val" id="dbgProvider">—</span></div>
    <div class="row"><span class="key">last e2e</span><span class="val" id="dbgE2e">—</span></div>
    <div class="row"><span class="key">heap live</span><span class="val" id="dbgHeapLive">—</span></div>
    <div class="row"><span class="key">heap peak</span><span class="val" id="dbgHeapPeak">—</span></div>
    <div class="row"><span class="key">heap total alloc'd</span><span class="val" id="dbgHeapTotal">—</span></div>
    <div class="row"><span class="key">allocator</span><span class="val" id="dbgAllocator">—</span></div>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;

    let isListening = false;
    // Selected language ('english' | 'spanish'). Drives question detection below;
    // the backend reads its own copy (set via set_language) on each Listen/answer.
    let currentLang = 'english';
    let transcriptLines = [];
    // Streaming engine only: per-speaker partial hypothesis, rendered as a gray
    // italic tail line that refines in place until the final replaces it.
    const partialLines = { me: '', interviewer: '' };
    let activeTraceId = null;   // the question currently being answered (for streaming)
    let firstDeltaSeen = false; // whether the active answer has painted its first token
    let lastAnsweredQ = '';     // normalized last question answered (dedup across the window)
    let lastTraceId = null;
    let lastTraceStart = 0;
    let lastE2eMs = 0;
    const MAX_TRANSCRIPT_LINES = 20;

    // Fire-and-forget structured log to the backend so JS events land in the
    // same JSONL file as Rust logs (unified trace timeline).
    function log(level, event, extra = {}) {
      const { trace_id, elapsed_ms, ...data } = extra;
      invoke('log_from_frontend', {
        entry: {
          level,
          event,
          trace_id: trace_id ?? null,
          elapsed_ms: elapsed_ms ?? null,
          data: Object.keys(data).length ? data : null,
        },
      }).catch((e) => console.error('log_from_frontend failed:', e));
    }

    // Escape user/transcribed text before inserting as HTML (label rendering).
    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));
    }

    // Load audio devices
    async function loadDevices() {
      const source = document.getElementById('sourceSelect').value;
      // Remember the choice across app relaunches — the dev loop restarts the
      // window constantly and a silently-reset source means capturing from the
      // wrong place (mic instead of system audio).
      localStorage.setItem('captureSource', source);
      const select = document.getElementById('deviceSelect');
      if (source === 'both') {
        select.innerHTML = '<option>default mic + default output</option>';
        select.disabled = true;
        return;
      }
      select.disabled = false;
      const cmd = source === 'loopback' ? 'list_output_devices' : 'list_audio_devices';
      try {
        const devices = await invoke(cmd);
        select.innerHTML = '';
        devices.forEach(d => {
          const opt = document.createElement('option');
          opt.value = d.name;
          opt.textContent = d.name + (d.is_default ? ' (default)' : '');
          if (d.is_default) opt.selected = true;
          select.appendChild(opt);
        });
      } catch (e) {
        console.error('Failed to list devices:', e);
      }
    }

    async function simulateInterviewer() {
      const input = document.getElementById('simInput');
      const text = input.value.trim();
      if (!text) return;
      log('info', 'simulate_interviewer_start', { chars: text.length });
      try {
        const path = await invoke('simulate_interviewer', { text });
        log('info', 'simulate_interviewer_done', { path });
      } catch (e) {
        console.error('simulate_interviewer failed:', e);
        log('error', 'simulate_interviewer_failed', { error: String(e) });
      }
    }

    async function setLanguage() {
      const language = document.getElementById('langSelect').value;
      currentLang = language;
      localStorage.setItem('language', language);
      try {
        await invoke('set_language', { language });
        log('info', 'language_set', { language });
      } catch (e) {
        console.error('set_language failed:', e);
      }
    }

    // Restore the persisted language, reflect it in the dropdown, and push it to
    // the backend so both sides agree before the first Listen.
    async function initLanguage() {
      const saved = localStorage.getItem('language') || 'english';
      currentLang = saved;
      document.getElementById('langSelect').value = saved;
      try {
        await invoke('set_language', { language: saved });
      } catch (e) {
        console.error('set_language (init) failed:', e);
      }
    }

    async function toggleListening() {
      const btn = document.getElementById('listenBtn');
      const dot = document.getElementById('statusDot');
      const status = document.getElementById('statusText');

      if (!isListening) {
        const device = document.getElementById('deviceSelect').value;
        const source = document.getElementById('sourceSelect').value;
        try {
          await invoke('start_listening', { deviceName: device || null, source });
          isListening = true;
          btn.textContent = 'Stop';
          btn.classList.add('active');
          dot.classList.add('live');
          status.textContent = 'Listening...';
        } catch (e) {
          console.error('Start failed:', e);
        }
      } else {
        try {
          await invoke('stop_listening');
          isListening = false;
          btn.textContent = 'Listen';
          btn.classList.remove('active');
          dot.classList.remove('live');
          status.textContent = 'Idle';
        } catch (e) {
          console.error('Stop failed:', e);
        }
      }
    }

    async function askBrain(question, traceId) {
      const input = document.getElementById('askInput');
      const q = question || input.value.trim();
      if (!q) return;

      // If the caller didn't pass a trace_id (manual ask), mint a new one so
      // we still get an end-to-end thread in the logs.
      const trace_id = traceId || crypto.randomUUID();
      activeTraceId = trace_id;
      firstDeltaSeen = false;
      const t0 = performance.now();

      const responseEl = document.getElementById('response');
      responseEl.textContent = '';
      responseEl.classList.add('loading');
      input.value = '';

      log('info', 'ask_start', { trace_id, manual: !traceId, question_len: q.length });

      try {
        const context = transcriptLines
          .map(l => (l.speaker === 'me' ? 'You' : 'Interviewer') + ': ' + l.text)
          .join('\n');
        const answer = await invoke('ask_brain', { traceId: trace_id, question: q, context });
        const elapsed_ms = Math.round(performance.now() - t0);
        responseEl.classList.remove('loading');
        responseEl.textContent = answer;
        log('info', 'ask_complete', { trace_id, elapsed_ms, answer_len: answer.length });

        // End-to-end: from transcription emit (backend) to painted answer (frontend).
        if (trace_id === lastTraceId && lastTraceStart > 0) {
          lastE2eMs = Math.round(performance.now() - lastTraceStart);
          document.getElementById('dbgE2e').textContent = lastE2eMs + ' ms';
          log('info', 'e2e_complete', { trace_id, elapsed_ms: lastE2eMs });
        }
      } catch (e) {
        const elapsed_ms = Math.round(performance.now() - t0);
        responseEl.classList.remove('loading');
        responseEl.textContent = 'Error: ' + e;
        log('error', 'ask_failed', { trace_id, elapsed_ms, error: String(e) });
      }
    }

    // Stream the answer token-by-token as it arrives from the backend.
    // The final full answer still comes back from the `ask_brain` invoke (which
    // reconciles `textContent`), but these deltas paint the first line in ~1s.
    listen('answer-delta', (event) => {
      const { trace_id, text } = event.payload;
      if (trace_id !== activeTraceId) return; // ignore stale deltas
      const responseEl = document.getElementById('response');
      responseEl.classList.remove('loading');
      if (!firstDeltaSeen && trace_id === lastTraceId && lastTraceStart > 0) {
        // First token = end-to-end "time to first word" for the debug panel.
        log('info', 'ttft', { trace_id, elapsed_ms: Math.round(performance.now() - lastTraceStart) });
      }
      firstDeltaSeen = true;
      responseEl.textContent += text;
      responseEl.scrollTop = responseEl.scrollHeight;
    });

    // Listen for transcription events from backend. Each line is labeled with its
    // speaker: 'interviewer' (loopback / system audio) or 'me' (mic).
    function speakerLabel(who) {
      return who === 'me'
        ? '<span class="spk-me">You:</span>'
        : '<span class="spk-int">Interviewer:</span>';
    }

    function renderTranscript() {
      const lines = transcriptLines.map(l => speakerLabel(l.speaker) + ' ' + escapeHtml(l.text));
      for (const who of ['interviewer', 'me']) {
        if (partialLines[who]) {
          lines.push('<span class="partial">' + speakerLabel(who) + ' ' + escapeHtml(partialLines[who]) + '</span>');
        }
      }
      const el = document.getElementById('transcript');
      el.innerHTML = lines.join('<br>');
      el.scrollTop = el.scrollHeight;
    }

    // Live partials from the streaming STT engine. The hypothesis refines in
    // place while the speaker talks; the final arrives as a regular
    // 'transcription' event (backend clears the partial with an empty text).
    listen('transcription-partial', (event) => {
      const { text, speaker } = event.payload;
      const who = speaker === 'me' ? 'me' : 'interviewer';
      partialLines[who] = text;
      renderTranscript();
    });

    listen('transcription', (event) => {
      const { trace_id, text, speaker } = event.payload;
      const who = speaker === 'me' ? 'me' : 'interviewer';
      lastTraceId = trace_id;
      lastTraceStart = performance.now();
      partialLines[who] = '';
      transcriptLines.push({ speaker: who, text });
      if (transcriptLines.length > MAX_TRANSCRIPT_LINES) {
        transcriptLines.shift();
      }
      renderTranscript();

      log('info', 'transcription_received', { trace_id, speaker: who, text_len: text.length });

      // By default only the INTERVIEWER's speech triggers an answer; your own voice
      // is context. The "answer me" toggle lets your mic questions be answered too.
      const answerMe = document.getElementById('answerMe').checked;
      if (who === 'me' && !answerMe) return;

      // Detect over a 2-chunk window of THIS speaker's lines so questions split
      // across chunk boundaries are still caught. Dedup against the last answered.
      const win = transcriptLines
        .filter(l => l.speaker === who)
        .slice(-2)
        .map(l => l.text)
        .join(' ');
      const q = extractQuestion(win);
      if (q) {
        const norm = q.toLowerCase().replace(/\s+/g, ' ').trim();
        if (norm !== lastAnsweredQ) {
          lastAnsweredQ = norm;
          log('info', 'question_detected', { trace_id, question: q });
          askBrain(q, trace_id);
        }
      }
    });

    // Rhetorical / confirmatory fillers — mostly the candidate checking in, not
    // interviewer questions worth answering. Keyed by language (see currentLang).
    const RHETORICAL = {
      english: [
        'right?', 'ok?', 'okay?', 'correct?', 'got it?', 'alright?', 'all right?',
        'yeah?', 'cool?', 'you know?', 'is that fine', 'does that make sense',
        'make sense?', 'anything so far', 'sound good', 'sounds good',
      ],
      spanish: [
        '¿no?', 'no?', '¿sí?', 'sí?', '¿ok?', 'ok?', '¿correcto?', 'correcto?',
        '¿se entiende?', 'se entiende', '¿tiene sentido?', 'tiene sentido',
        '¿está bien?', 'está bien', '¿dale?', 'dale?', '¿viste?', 'viste?',
        '¿todo bien', 'hasta acá',
      ],
    };
    function isRhetorical(s) {
      const t = s.toLowerCase();
      return (RHETORICAL[currentLang] || RHETORICAL.english).some(r => t.includes(r));
    }

    // Sentence openers that signal an interviewer question when there's no '?'.
    const Q_STARTERS = {
      english: [
        'what ', 'how ', 'why ', 'can you', 'could you', 'tell me ', 'explain ',
        'describe ', 'what\'s', 'where ', 'when ', 'which ', 'walk me through',
        'how would', 'how do', 'what are', 'what would', 'design a', 'design the',
        'would you ', 'do you ', 'have you ',
      ],
      spanish: [
        'qué ', 'que ', 'cómo ', 'como ', 'por qué', 'por que', 'cuál', 'cual',
        'cuándo', 'cuando', 'dónde', 'donde', 'quién', 'quien', 'podés', 'podrías',
        'podrias', 'contame', 'contás', 'explicá', 'explicame', 'describí',
        'describime', 'hablame de', 'háblame de', 'diseñá', 'diseña ', 'me podés',
        'me das', 'alguna vez', 'tenés', 'tenes ', 'sabés', 'sabes ',
      ],
    };
    function qStarters() {
      return Q_STARTERS[currentLang] || Q_STARTERS.english;
    }

    // Extract a real question from a text window, or null. Handles a '?' anywhere
    // (not just at the end) and pulls a clean lead-in so we send the LLM just the
    // question — not the whole multi-sentence chunk.
    function extractQuestion(text) {
      const qi = text.lastIndexOf('?');
      if (qi >= 0) {
        // Lead-in: back to the previous sentence boundary, capped at 180 chars.
        let start = Math.max(
          text.lastIndexOf('.', qi - 1),
          text.lastIndexOf('?', qi - 1),
          text.lastIndexOf('!', qi - 1),
        );
        if (start < 0 || qi - start > 180) start = Math.max(-1, qi - 180);
        const q = text.slice(start + 1, qi + 1).trim();
        if (q.length >= 12 && !isRhetorical(q)) return q;
      }
      // No '?': accept a last sentence that starts like an interviewer question.
      const sentences = text.split(/(?<=[.?!])\s+/).map(s => s.trim()).filter(Boolean);
      const last = sentences[sentences.length - 1] || '';
      // Strip leading Spanish inverted marks so '¿qué...' matches the 'qué' starter.
      const lastNorm = last.toLowerCase().replace(/^[¿¡\s]+/, '');
      if (last.length >= 12 && !isRhetorical(last) &&
          qStarters().some(st => lastNorm.startsWith(st))) {
        return last;
      }
      return null;
    }

    // --- Debug panel wiring ---
    const debugPanel = document.getElementById('debugPanel');

    // Threshold for coloring latency: <1ms green/normal, <5ms amber, >=5ms red.
    function fmtUs(us) {
      if (!us) return '—';
      const ms = us / 1000;
      if (ms >= 1) return ms.toFixed(2) + ' ms';
      return us + ' µs';
    }
    function classifyUs(us, warnUs, badUs) {
      if (!us) return '';
      if (us >= badUs) return 'bad';
      if (us >= warnUs) return 'warn';
      return '';
    }

    function fmtBytes(n) {
      if (!n) return '—';
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      if (n < 1024 * 1024 * 1024) return (n / 1024 / 1024).toFixed(1) + ' MB';
      return (n / 1024 / 1024 / 1024).toFixed(2) + ' GB';
    }

    listen('metrics', (event) => {
      const m = event.payload;
      const setCell = (id, us, warnUs, badUs) => {
        const el = document.getElementById(id);
        el.textContent = fmtUs(us);
        el.className = 'val ' + classifyUs(us, warnUs, badUs);
      };
      // Audio callback budget is ~10ms at typical buffer sizes — flag at 1ms/5ms.
      setCell('dbgP50', m.callback_p50_us, 1000, 5000);
      setCell('dbgP95', m.callback_p95_us, 1000, 5000);
      setCell('dbgP99', m.callback_p99_us, 1000, 5000);
      setCell('dbgP999', m.callback_p999_us, 1000, 5000);
      document.getElementById('dbgSamples').textContent = m.callback_samples || '—';
      document.getElementById('dbgStt').textContent = m.last_stt_ms ? m.last_stt_ms + ' ms' : '—';
      document.getElementById('dbgLlm').textContent = m.last_llm_ms ? m.last_llm_ms + ' ms' : '—';
      document.getElementById('dbgTtft').textContent = m.last_llm_ttft_ms ? m.last_llm_ttft_ms + ' ms' : '—';
      document.getElementById('dbgProvider').textContent = m.last_provider || '—';
      if (lastE2eMs) document.getElementById('dbgE2e').textContent = lastE2eMs + ' ms';

      // Allocator label is always populated — it's compile-time constant.
      document.getElementById('dbgAllocator').textContent = m.allocator_name || '—';

      // Heap metrics only meaningful when compiled with the counting-alloc feature.
      if (m.counting_alloc_enabled) {
        document.getElementById('dbgHeapLive').textContent = fmtBytes(m.heap_live_bytes);
        document.getElementById('dbgHeapPeak').textContent = fmtBytes(m.heap_peak_live_bytes);
        document.getElementById('dbgHeapTotal').textContent = fmtBytes(m.heap_total_allocated_bytes);
      } else {
        document.getElementById('dbgHeapLive').textContent = '— (feature off)';
        document.getElementById('dbgHeapPeak').textContent = '— (feature off)';
        document.getElementById('dbgHeapTotal').textContent = '— (feature off)';
      }
    });

    listen('toggle-debug-panel', () => {
      debugPanel.classList.toggle('visible');
    });

    // Init — restore the last capture source before populating devices.
    const savedSource = localStorage.getItem('captureSource');
    if (savedSource) {
      document.getElementById('sourceSelect').value = savedSource;
    }
    loadDevices();
    initLanguage();
  </script>
</body>
</html>
