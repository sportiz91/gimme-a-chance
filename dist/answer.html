<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>gimme — answer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Stealth: the system cursor is composited into screen shares, so over
       this invisible overlay it must never turn into anything but the plain
       arrow — no hand on buttons, no resize arrows. !important beats the
       per-element rules (and answer-stack.css). Drag/resize still work —
       neither depends on the cursor shape. See resize.js. */
    * { cursor: default !important; }

    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: rgba(15, 15, 15, 0.92);
      color: #e0e0e0;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      flex-direction: column;
    }

    .titlebar {
      height: 32px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      background: rgba(30, 30, 30, 0.95);
      /* No grab/grabbing cursor — the cursor must never mutate over the
         invisible overlay (screen-share viewers see the system cursor).
         See resize.js for the full story. */
    }
    .titlebar span { font-size: 11px; opacity: 0.5; }
    .titlebar button {
      padding: 0 8px;
      border: none;
      background: transparent;
      color: #e0e0e0;
      font-size: 14px;
      line-height: 24px;
      cursor: pointer;
      opacity: 0.6;
    }
    .titlebar button:hover { opacity: 1; }

    /* The same answer stack as the main window, one size up — this window
       exists to be read from a distance. Card styling: answer-stack.css. */
    #answer {
      flex: 1;
      overflow-y: auto;
      font-size: 16px;
      /* No top padding: see #response in index.html — sticky card headers. */
      padding: 0 12px 12px;
    }
    #answer:empty { padding-top: 10px; }
    #answer:empty::after {
      content: 'The answer streams here…';
      opacity: 0.3;
      font-style: italic;
    }
  </style>
  <link rel="stylesheet" href="highlight-github-dark.min.css" />
  <link rel="stylesheet" href="answer-stack.css" />
  <script src="highlight.min.js"></script>
  <!-- Classic script on purpose: the inline script below calls
       createAnswerStack() at parse time, before deferred modules run. -->
  <script src="answer-stack.js"></script>
  <script src="resize.js" defer></script>
  <script type="module">
    import * as smd from './smd.js';
    window.smd = smd;
  </script>
</head>
<body>
  <div class="titlebar" data-tauri-drag-region>
    <span>Answer</span>
    <button id="closeBtn" title="Close">✕</button>
  </div>
  <div id="answer"></div>

  <script>
    // Pop-out mirror of the main window's Answer stack. The main window relays
    // every stack mutation as an `answer-mirror` event (begin/delta/final/
    // error/clear, keyed by trace id) and we replay it into an identical stack.
    // Collapse state is deliberately NOT mirrored — it's this reader's own view.
    const { listen, emit } = window.__TAURI__.event;
    const stack = window.createAnswerStack(document.getElementById('answer'));

    listen('answer-mirror', (event) => {
      const { op, id, text, meta } = event.payload;
      if (op === 'begin') stack.begin(id, meta);
      else if (op === 'delta') stack.delta(id, text);
      else if (op === 'final') stack.final(id, text);
      else if (op === 'error') stack.error(id, text);
      else if (op === 'clear') stack.clear();
    });

    // Close → the backend intercepts CloseRequested and PARKS the window
    // off-screen (never destroys it). We must NOT call hide() here: hide() sets
    // the window invisible, and the backend re-reveal only re-positions it (it
    // deliberately never calls show(), because show() degrades the capture
    // exclusion to a black box — tauri#14189). So a hidden window could never be
    // brought back. close() routes through the park path and keeps it revealable.
    document.getElementById('closeBtn').addEventListener('click', () => {
      window.__TAURI__.window.getCurrentWindow().close();
    });

    // Ask the main window to replay its whole stack (covers opening the pop-out
    // mid-stream, or after several answers already piled up).
    emit('answer-window-ready', {});
  </script>
</body>
</html>
